services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: infraup
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/infraup
    depends_on:
      - postgres

  sync:
    build:
      context: .
      dockerfile: apps/generator/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/infraup
    depends_on:
      - postgres
    restart: "no"

volumes:
  pgdata:
