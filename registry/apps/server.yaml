slug: server
name: Nextcloud
category: STORAGE
description: Self-hosted file sync and collaboration platform. Store, share, and collaborate on files with end-to-end encryption and mobile apps.
subdomain: cloud
tier: FREE
dockerImage: nextcloud
dockerRegistry: dockerhub
dockerPreferredTag: latest
officialDockerImage: true
dockerHubUrl: "https://hub.docker.com/_/nextcloud"
port: 80
minRam: "1GB"
license: AGPL_3
deploymentComplexity: MODERATE
replaces:
  - GoogleDrive
  - Dropbox
tags:
  - storage
  - file-sync
  - collaboration
  - cloud-storage
  - self-hosted
dependencies:
  - id: postgres
    type: DATABASE
    optional: false
  - id: redis
    type: CACHE
    optional: false
envs:
  - key: NEXTCLOUD_TRUSTED_DOMAINS
    template: "{{ .Subdomain }}.{{ .Domain }}"
  - key: OVERWRITEPROTOCOL
    value: "https"
  - key: POSTGRES_HOST
    value: "postgres"
  - key: POSTGRES_DB
    template: "{{ .DBName }}"
  - key: POSTGRES_USER
    template: "{{ .DBUser }}"
  - key: POSTGRES_PASSWORD
    template: "{{ .DBPassword }}"
  - key: REDIS_HOST
    value: "redis"
  - key: REDIS_PORT
    value: "6379"
volumes:
  - name: data
    path: /var/www/html
features:
  hasApi: true
  hasMobileApp: true
  hasSSOSupport: true
  hasBackupTool: false
  hasMultiLanguage: true
  hasAuditLog: false
  hasGuestAccess: true
  hasOfflineMode: true
affiliate:
  hasAffiliate: false
  affiliateUrl: ""
  affiliateSignupUrl: ""
featured: false
businessRelevance: 8
meta:
  website: "https://nextcloud.com"
  github: "https://github.com/nextcloud/server"
  docs: "https://docs.nextcloud.com"
  logo: "nextcloud.svg"
