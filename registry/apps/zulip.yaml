slug: zulip
name: "Zulip"
category: MESSAGING
description: "Zulip server and web application. Open-source team chat that helps teams stay productive and focused with threaded conversations."
subdomain: zulip
tier: FREE
dockerImage: zulip/docker-zulip
dockerRegistry: dockerhub
dockerPreferredTag: latest
officialDockerImage: true
dockerHubUrl: "https://hub.docker.com/r/zulip/docker-zulip"
port: 443
minRam: "1GB"
license: APACHE_2
deploymentComplexity: COMPLEX
replaces:
  - "Slack"
  - "Discord"
  - "Microsoft Teams"
tags:
  - "chat"
  - "messaging"
  - "threaded"
  - "team-communication"
dependencies:
  - id: postgres
    type: DATABASE
    optional: false
  - id: redis
    type: CACHE
    optional: false
  - id: rabbitmq
    type: BROKER
    optional: false
envs:
  - key: EXTERNAL_HOST
    template: "{{ .Subdomain }}.{{ .Domain }}"
  - key: ZULIP_ADMINISTRATOR
    template: "admin@{{ .Subdomain }}.{{ .Domain }}"
  - key: POSTGRES_HOST
    value: "postgres"
  - key: POSTGRES_DB
    template: "{{ .DBName }}"
  - key: POSTGRES_USER
    template: "{{ .DBUser }}"
  - key: POSTGRES_PASSWORD
    template: "{{ .DBPassword }}"
  - key: REDIS_HOST
    value: "redis"
  - key: RABBITMQ_HOST
    value: "rabbitmq"
volumes:
  - name: data
    path: /home/zulip/data
features:
  hasApi: true
  hasMobileApp: true
  hasSSOSupport: true
  hasBackupTool: true
  hasMultiLanguage: true
  hasAuditLog: true
  hasGuestAccess: false
  hasOfflineMode: true
affiliate:
  hasAffiliate: false
  affiliateUrl: ""
  affiliateSignupUrl: ""
featured: false
businessRelevance: 6
meta:
  website: "https://zulip.com"
  github: "https://github.com/zulip/zulip"
  docs: "https://zulip.readthedocs.io"
  logo: "zulip.svg"
